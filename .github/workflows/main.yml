name: Generate Snake

on:
  schedule:
    # Her 6 saatte bir otomatik çalışır
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Botun deponuza yazma izni (Hata almamanızı sağlayan kritik kısım)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Depoyu kontrol eder
      - uses: actions/checkout@v3

      # Yılan animasyonunu (hem GIF hem SVG) en güncel sürümle üretir
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: fatih-gursoyDev020
          outputs: |
            dist/github-contribution-grid-snake.gif
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Üretilen dosyaları tertemiz bir şekilde 'output' dalına (branch) yükler
      - uses: crazy-max/ghaction-github-pages@v3.5.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
